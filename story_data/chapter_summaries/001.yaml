chapter_number: 1
title: "玻璃瓶的三下声音"
summary: "夏浮在拾光书店工作，声音微感介绍：旧书的尖叫令她痛苦，新书近乎沉默。梁书接到疑似房管所通知的电话，书店租约危机初现。傍晚一个陌生男人（温野）走进书店，在旧书架和一个玻璃瓶前驻足，以奇特姿态'看'那些物体，然后离开。夏浮触碰玻璃瓶，听见他留下的三下声音——清晰、干净、带着寻找的频率——与普通旧物的回忆截然不同。她在笔记本里记下这一天，隐约感到有什么东西刚刚开始。"
