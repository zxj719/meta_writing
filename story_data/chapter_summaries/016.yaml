chapter_number: 16
title: 谈判日
summary: 葬礼后第二十四天，下午两点。夏浮和温野在前厅等待，梁书在后台与房东谈判。夏浮通过声音微感感知谈判全程——不是话语，是声音的频率、振幅、节奏的变化。谈判结束，房东离开。梁书把一张纸放在收银台上说"谈完了"，没有说结果。纸上墨水的振动频率介于续约和终止之间——夏浮听不懂。温野问结果，梁书说"先看展览"。章末夏浮走进后门，书店里只剩那张纸和那片光。
events:
- 夏浮和温野在前厅等待，书店有屏住呼吸的质感
- 房东到来，夏浮感知到他的鞋底是新的，没有书店的旧痕迹
- 梁书出来接待，两人进入后台谈判，门关上
- 夏浮通过门板振动感知谈判节奏：交替→重叠→加速→长沉默→一声确定的"放下"
- 房东离开，梁书把合同（或文件）放在收银台，说"谈完了"
- 梁书握了一下铸铁钥匙，放回铁钩
- 夏浮触摸那张纸，感知墨水频率，听不懂
- 温野问结果，梁书答"先看展览"
- 夏浮走进后门，书店里只剩光和那张纸
