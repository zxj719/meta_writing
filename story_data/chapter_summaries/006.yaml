chapter_number: 6
title: 红星新村
summary: 葬礼后第五天，夏浮微感仍在恢复期（太阳穴刻度5/10）。温野带来一把旧铜钥匙，邀她去即将拆除的红星新村。两人进入三层老楼，在一楼和三楼联合感知：她描述声音频率，他描述温度痕迹，两份记录写在同一页笔记本上——各自的字迹并排，说的是同一件事。三楼走廊痕迹密集，过载升至七点五，夏浮主动剥离噪声拉出最后一条关键线索（孩子那次从里面被开的门）后撤退。楼外台阶恢复，温野问起葬礼台阶上的状态，夏浮第一次向他承认"礼堂墙壁声音太多，我碰了，它们都涌进来了"。温野未说完的问句"你以前有没有遇见过别人也能——"，夏浮回答"嗯"——一个字，第一次对另一个人承认自己的能力。
events:
- 温野带夏浮进入红星新村（拆前一天）
