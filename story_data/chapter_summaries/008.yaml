chapter_number: 8
title: 两个上午
summary: 葬礼后第十一天，刻度2。夏浮独自查到城东旧粮仓地址，清晨未告知温野，先行前往。粮仓建于1972年，砖木混合，穹顶弧形木梁，铁质粮斗，空间密度沉实。感知所得：粮斗东西两侧各有一组摩擦痕迹（成年男性宽手掌1.35m，少年窄手掌1.1-1.2m）；高处木梁有绳索滑轮摩擦；地面磨损形成固定动线；角落折叠铁椅椅腿前端偏磨（孩子坐着脚不着地）。关键盲点：两人是同时在场还是轮班——声音无法判断时序，在笔记本问号旁第一次写入温野的名字。刻度升至4.5后主动撤退。回书店后梁书在处理后台事务（书店困境）。温野下午来，也去了粮仓，比夏浮晚两小时，带来热量时序信息：东侧热量层更旧（东先），西侧更新（西后）——两人轮班而非同时。两人拼合记录约四十分钟，时间差反而提供了更完整的时序维度。记录拼合中笔记本无意翻到幼年旧页（梧桐叶柄撕裂的记录），温野问起，夏浮陈述："我妈带我去看过医生，说想象力太丰富，后来就不说了，但还是记着。" 温野接住，未立即对等揭露（留下张力）。傍晚温野问"记下来就够了吗"，夏浮答"以前够，现在不确定"——声音博物馆概念最早萌芽。关店后夏浮整理笔记，将问号填为答案，合上小时候那页，关灯锁门离开。
