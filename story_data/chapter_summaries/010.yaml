chapter_number: 10
title: 托住
summary: 葬礼后第十六天，刻度2。夏浮早到书店，注意到那沓打印纸仍在台面中央。梁书来后取走那沓纸放入抽屉（非扔弃），书店困境状态微移。温野早来约去城西供销社，梁书接管后两人出发，途中温野介绍建筑历史（1963年建，九十年代关，现为危楼下月拆）。夏浮提前建立感知框架（粮油/布匹/铁器/五金/农具各有密度方向）。入内后在计价台区域发现悬挂铁质秤盘，独立感知出完整姿势序列：托—稳—转—放，两种手掌宽度，高度约九十厘米。温野补充热量信息：捧的轮廓（掌心到指根）、脚偏右/惯用右手、某段时期使用频率更高。两份合并后得出"一个站在台后右手捧秤盘的人的身体"，是第一次合并出有具体姿势序列的完整身体形象。夏浮尝试用文字还原转腕角度，写不出来——写出的是"影子，不是那件事本身"。楼梯口感知二楼密度高达刻度4，主动撤退；温野"不用，我看见的东西你上不去就说不清楚"——互补性进一步确认。台阶上夏浮说出"如果那个姿势能被还原出来"（非问句），温野"嗯"，声音博物馆功能从"格式转换"向"姿势的可还原性"前进。回书店后夏浮独自在笔记本里试写姿势，最终留下"影子，不是那件事本身"的认知节点，梁书在后台处理事务。
