chapter_number: 4
title: 礼堂
summary: 周伯是书店常客，每周二五来坐旧沙发读杂志，夏浮习惯于他留下的声音痕迹。某天梁书接到电话，告知周伯两天前夜里去世。葬礼在旧城区老礼堂举行。夏浮独自前往，途中先在空书店触碰旧沙发、收银机、台灯，被积年痕迹叠加触发过载，踉跄走出门口才平复。礼堂内部更甚：几十年的葬礼、悼念、聚集全部叠加，夏浮触碰礼堂墙壁后全面过载，被声音'淹没'，只能强行撤离。这是她经历过的最严重过载，礼堂的'禁忌空间'属性被揭示。
events:
- 周伯书店日常：沙发感知场景建立，夏浮与周伯的无言关系
- 梁书接电话告知周伯逝世（前天夜里）
- 夏浮决定代梁书去参加葬礼
- 葬礼前书店独处：触碰旧沙发/收银机/台灯触发过载
- 旧礼堂葬礼：触碰墙壁引发严重过载，夏浮强行撤退
