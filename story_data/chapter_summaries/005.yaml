chapter_number: 5
title: "底噪"
summary: "葬礼后第三天，过载后底噪持续，日常物体的声音都被放大至无法忽视。夏浮小心翼翼地走到书店，全程避免触碰任何物体。书店里，她再次感知周伯沙发，这次沉入更深层——弹簧本身的声音、木匠制作时的声音——葬礼后的感知深度发生了变化。她翻阅多本笔记本，发现约三分之一记录对应的物体已消失（拆迁/遗弃），文字只能留住影子，不能还原声音本身。梁书去见房东谈续约。温野来访，两人沉默共处近两小时。温野翻到周伯停下的那页杂志，手指停在那里。最后温野开口：'我看见的那个温度，和你听见的是同一个人'——两人第一次明确确认互补感知，对话以此结束。"
