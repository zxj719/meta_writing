chapter_number: 7
title: 同一把钥匙
summary: 葬礼后第七天，夏浮太阳穴刻度降至2（日常基准），回书店上班。温野带着从红星新村带出来的那把铜钥匙来到书店，在收银台前两人围绕钥匙进行第一次非实地互补感知：他描述温度分布的高度（三层、三个人），她描述摩擦位置的高度（一低两高），两者完全对得上。随即两人各自说出了长久以来的自我解释："我一直以为我只是听力太好"/"我一直以为我只是眼力太好"——第一次真正互相承认。温野提及上个月在书店录过环境音（纪录片素材），夏浮得知后问他录到了什么。书店墙上的七把旧钥匙成为两人靠近感知（未触碰）的第二组对象，其中一把的余热和摩擦痕迹仍在，两人各自读出对应信息。梁书在后台处理书店租约困境，临近关门前告知夏浮房东要调整方案、暂时等。温野离开前在门口问："小时候你有没有试过告诉别人？"夏浮沉默，看向那排旧钥匙，没有回答。夜里夏浮独自回到出租屋，躺在床上，想起那个问题，想起曾试过、后来学会了不试，今天的底噪稳在两，比昨天低了一点。
events:
- 温野带红星新村铜钥匙到书店
- 收银台前的非实地互补感知（第一次离开现场仍能互补）
- 两人各自说出"听力/眼力太好"的自我解释，正式互相承认
- 书店旧钥匙的靠近感知（未触碰，两种感知互验）
- 温野提及上个月在书店录音的细节（闪回）
- 梁书向夏浮透露书店房东困境（要调整方案，暂等）
- 温野离开前的问题："小时候你有没有试过告诉别人？"夏浮沉默
