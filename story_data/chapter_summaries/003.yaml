chapter_number: 3
title: "旺铺招租"
summary: "梁书接电话后提前离开，书店门上已贴着房东的'旺铺招租'告示，租约危机明确化。温野傍晚带馄饨来访，梁书不在，两人一起锁店、走雨夜旧城区。夏浮边走边听路面石板和爬山虎的声音；温野在一扇半开窗前对着枯萎的花盆悬手感知——两人都在做各自的感知动作，但都不说。回到书店附近，两人第一次有了真正的共处和接触，馄饨是第一个'礼物式'动作。夏浮观察到温野的悬手模式与他第一次来书店时相同，开始把两次行为联系起来。"
