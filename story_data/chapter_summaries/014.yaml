chapter_number: 14
title: 旧笔记本
summary: 葬礼后第二十二天。夏浮第二次从后门进入书店，铰链声已有了方向感。梁书以三个字"推了一天"宣布谈判再次延期。夏浮独自将三本最旧的笔记本铺在长桌上，对比它们三年的质感差异，继而将书店本身作为感知对象走了一遍——这是她三年来第一次把书店当作有声音的地方而非工作场所来感知。梁书端来水和茶，两人沉默片刻后交换了两组数字：十四本对三本。梁书提出将秤盘姿势放在展览入口——"第一个被记住的姿势"。章末确认：明天房东两点来，没有再推的余地了。
events:
- 夏浮第二次使用后门钥匙，铰链声比昨天熟悉了一格
- 梁书说"推了一天"——谈判再延期，前途未明
- 夏浮将最旧的三本笔记本摆在长桌，感知三年纸张质感的差异（第一本最压实，第二本翻松，第三本尚脆）
- 夏浮以感知者视角对书店做了一遍完整巡游：旧钥匙、书架、收银台划痕、正门铰链
- 梁书端来水和茶，两人交换数字：夏浮十四本，梁书三本账本
- 梁书提出秤盘姿势放展览入口——"第一个被记住的姿势，因为那是开始"
- 约定明天：房东两点来，温野三点来
