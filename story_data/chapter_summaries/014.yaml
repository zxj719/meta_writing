chapter_number: 14
title: 旧笔记本
summary: 下午两点四十五分，夏浮用后门钥匙进入书店，发现梁书特意在收银台等她。两人默契地沉默，梁书为她准备了热茶。当夏浮拿出那本深蓝色旧笔记本时，梁书的视线在封皮上停留了一下——那个封皮似乎触动了什么。
events:
- 夏浮第一次使用后门钥匙进入书店，梁书已在收银台等候
- 梁书主动为夏浮准备了热茶，用的是后面小屋的旧茶具
- 梁书表示今天不外出，暗示她特意留在店里等夏浮
- 夏浮拿出那本深蓝色旧笔记本，封皮有旧墨渍
- 梁书注意到笔记本封皮，停顿后问'你的？'
- 夏浮开始翻开笔记本...
characters_present:
- 夏浮
- 梁书
