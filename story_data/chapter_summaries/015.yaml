chapter_number: 15
title: 三个人的桌子
summary: 梁书带着一杯凉透的美式推迟了房东谈判，在下午两点半出现在书店门口，温野几乎同时到达。三人第一次完整地围坐在那张梧桐木长桌前，夏浮用感知读到梁书身体里积攒的疲惫，而梁书主动开口说：「展览的事，能不能给我也讲一遍。」
events:
- 梁书带着凉透的美式出现在书店门口（2:28），杯壁干燥无水珠表明咖啡放了很久
- 温野几乎同时到达，手里拿着刚从冷柜拿出的蓝色塑料杯咖啡
- 三人第一次完整地围坐在长桌前——梁书在灯这边，温野在灯那边，夏浮在中间
- 夏浮用感知读取梁书的状态：左手指尖暖但掌心凉，无名指有橡皮筋勒痕，肩膀比早上低了两厘米但斜方肌仍紧绷，后背小块肌肉在轻微颤抖
- 温野问起咖啡，梁书说去的是他以前常去那家但那家上个月搬了，她就是想喝那个味道
- 梁书主动提出要看那个展览的笔记，要求温野把展览的事讲一遍
