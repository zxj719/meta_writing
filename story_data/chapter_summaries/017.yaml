new_information_revealed:
- 梁书会做秤盘姿势，且极为熟练——身体记忆，不是表演
- 梁书握后门钥匙的方式与夏浮不同（握在尾部，手指更散）——她和这把钥匙有独立的关系
- 夏浮的锁门姿势被温野识别为"长进了身体里的姿势"，三年每天重复
- 展览从"让观众体验"转向"让观众见证"——核心概念升级
foreshadowing_planted:
- 梁书秤盘姿势的身体记忆触发了夏浮对供销社的感知残影——梁书与供销社的深层连接未解
- 梁书握钥匙方式留下的新痕迹——她对书店有某种超越租客关系的情感依附
- "谁记录，谁做"——温野定下这个原则，未来展览若出岔子会回来检验这个承诺
foreshadowing_paid_off:
- ch10_scale_gestures：供销社秤盘姿势（托住、稳住、转腕、轻放）第一次出现在感知记录，此章变成了展览的核心站点
- ch16_exhibition_as_bet：梁书说"先看展览"——此章展览方案正式成型
