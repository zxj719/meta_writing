chapter_number: 17
title: 展览布局日
summary: 葬礼后第二十五天，上午十点。夏浮进入书店，发现长桌已被挪动、书架移开、墙面清出——梁书一个人重新规划了空间。温野带平板草图到来，草图方案是"让观众动手做"（七个站点，观众可尝试）。梁书说"我想要的不是这个"，提出让观众"看见有人在做"而非自己模仿——姿势一旦被模仿就死了。梁书主动演示秤盘姿势（托住、稳住、转腕、轻放），三人沉默。温野说"你会做"，梁书答"会"。温野定稿：梁书负责秤盘姿势、可教授他人；温野负责视觉；夏浮的锁门姿势被列为第七站点。章末夏浮锁后门，感知钥匙，触到了梁书今天握过钥匙留下的新痕迹，感知延伸至秤盘姿势留下的记忆——不是声音，是记忆，像烟散了。
events:
- 夏浮进入书店，感知长桌被挪动、书架移开、梁书在清洁墙面
- 温野携平板草图到来（七站点，观众可尝试方案）
- 梁书否定温野方案："我想要的不是这个"——让观众看见而非自己做
- 梁书主动演示秤盘姿势（托住、稳住、转腕、轻放）——三人沉默，夏浮听见记忆里的重量
- 温野确认"你会做"，梁书答"会"，无解释来源
- 夏浮提议可以教——梁书说"可以教给愿意学的人"
- 翻书姿势：梁书用有折痕诗集演示，温野摩挲折痕
- 夏浮锁门姿势被温野定为第七站点："那个姿势是你的"
- 七站点草图修改完成：每站点加入执行者、背景说明
- 章末夏浮锁后门，感知钥匙，触到梁书握钥匙方式不同的痕迹，感知秤盘记忆——像烟散了
characters_present:
