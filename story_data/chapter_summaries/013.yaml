chapter_number: 13
title: 抽屉里的声音
summary: 夏浮第一次从后门进入拾光书店，在后台等待梁书时，用能力听见了抽屉里积压的纸张声音——七张涨租通知、账单、旧合同，以及一个被压在最底部听不清楚的声音。她没有打开抽屉，只是将八条声音信息逐一记下，十分钟后梁书到来。
events:
- 夏浮用后门钥匙（铜的，有磨损）从窄巷进入书店后台
- 她用能力感知抽屉里的纸张声音
- 听到七张涨租通知（金额从四位数到五位数，截止日期逐月排开）
- 听到账单（数字、日期、金额，已付/欠催标记）
- 听到合同（装订过的，厚纸，有翻阅痕迹）
- 感知到一个被压在最底下、说不出来的声音
- 她选择不打开抽屉，只是记住那些声音
- 十分钟后梁书从后门进入
