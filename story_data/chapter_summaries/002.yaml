chapter_number: 2
title: "那层玻璃"
summary: "温野POV。他在新城区出租屋拍摄即将拆除的旧楼，为纪录片寻找素材，却总觉得画面和观众之间隔着'一层玻璃'。三个月前他开始能看见物体上的热量痕迹（温度微感），最初以为是眼病，后来接受了这一事实。他用相机尝试捕捉这些痕迹，效果有限。他在旧城区探索时找到拾光书店，进门后书架上密密麻麻的积年热量痕迹令他过载。他发现书店里某个女店员在旧书架前的行为也很异常，察觉她可能同样能感知到他看不见的东西。他将纪录片项目命名为'城市中正在消失的声音'。"
