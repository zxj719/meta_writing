chapter_number: 12
title: 书店危机
summary: 梁书因房东将租金涨至一倍半、合同下周必须签署的绝境，主动打破三年来的保护性沉默，找来夏浮和温野求助。她在前台向两人坦白书店存亡危机，话说到"想找一个办法"时戛然而止，留下悬念。
events:
- 梁书发微信约夏浮第二天下午三点到后台帮忙
- 夏浮提前到达，听到后台有翻找东西的声音和叹气声
- 温野从后门进入，称收到梁书消息让他来看秤盘
- 梁书走出后台，将几张便笺纸暂放在收银台旁
- 梁书在前台正式开口：房东涨租一倍半，合同下周签
- 梁书说"我想在做一个"后戛然而止，话未说完
