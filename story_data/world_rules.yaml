- name: 微感
  category: magic_system
  description: '极少数人天生拥有的微小感知异能。不是超能力，更接近于一种多出来的感官维度。

    微感的本质：感知时间在物体上留下的痕迹。每一个物体都记得自己的经历——被触碰、被使用、被遗忘的全部历史。微感者能读取这些痕迹，但方式因人而异。

    已知的微感类型：

    - 夏浮：听觉型微感。能听见时间在物体上留下的痕迹——一块石头记得被溪水冲刷了多少年，一扇门记得被推开了多少次，一件旧毛衣记得谁的手曾经织过它。也能听见情感消逝的回声——落叶的叹息、眼泪的重量、咽回去的话。

    - 温野：视觉型微感。能看见物体被使用时残留的温度痕迹——一杯水被端起的次数，一本书被翻到哪一页时停留最久，一把椅子上坐过的人留下的热量轮廓。

    微感不会增强，不会进化，不能用来战斗。它更像一种诅咒——让你比所有人多知道一点点，但那一点点足以让你和所有人之间隔开一层透明的墙。

    '
  constraints:
  - 微感无法关闭或控制强度
  - 微感感知的是时间在物体上留下的痕迹——使用、触碰、经历的累积记忆
  - 微感不能用于读心——感知的是物体的记忆，不是人的想法
  - 感知过载时会造成头痛、失眠、情绪崩溃
  - 微感者彼此不能直接感知到对方的能力
  - 听觉型和视觉型微感可以互补——声音与画面结合时，物体的记忆变得完整
  introduced_chapter: 1
- name: 时间痕迹
  category: magic_system
  description: '每一个物体都在无声地记录自己的经历。被触碰多少次、被谁使用过、承载过怎样的情感。

    这些痕迹像是物体的记忆，嵌在它们的纹理、温度、震动频率中。

    痕迹的密度与物体的年龄和使用频率成正比——一扇被推开了三十年的老门，痕迹浓到像一首交响曲；一把刚出厂的塑料椅，几乎是沉默的。

    普通人完全无法感知这些痕迹。听觉型微感者听见它们化为声音，视觉型微感者看见它们化为温度和光。

    '
  constraints:
  - 痕迹是累积的，不会消散——越老的物体痕迹越深
  - 痕迹是只读的——能感知但不能修改或消除
  - 高密度痕迹区域（老建筑、旧物件密集处）会让微感者感到眩晕
  - 痕迹无法被录音或拍摄——只存在于微感者的感知中
  introduced_chapter: 1
- name: 声音博物馆
  category: plot_device
  description: '温野的终极项目：将夏浮听见的声音痕迹与自己看见的温度痕迹结合，

    通过影像、装置和空间设计，转化为普通人也能体验的沉浸式展览。

    让那些「留不住的东西」变成「看得见的画面」。

    这是两种微感的首次协作——听觉与视觉互补，物体的完整记忆第一次被呈现给普通人。

    '
  constraints:
  - 需要夏浮和温野密切配合——她描述声音，他转化为视觉
  - 转化过程中不可避免地会损失一部分原始感知的细腻度
  - 展览本身不赋予观众微感，只是一种近似的体验
  introduced_chapter: null
- name: 鹿城地理
  category: geography
  description: '南方二线城市，湿润多雨。分为旧城区和新城区。

    旧城区：窄巷、梧桐树、老式公寓、独立小店。正在被逐步拆迁改造。物体年代久远，时间痕迹极为浓厚。

    新城区：玻璃幕墙、商业综合体、标准化公寓。干净但空洞，物件崭新，几乎没有痕迹。

    '
  constraints:
  - 旧城区正在缩小——拆迁持续进行
  - 夏浮在旧城区感知到的声音远多于新城区
  - 旧城区被拆除意味着大量时间痕迹永远消失
  introduced_chapter: 1
