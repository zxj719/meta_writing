name: 夏浮
aliases:
- 小夏
physical_description: 瘦小，皮肤偏白，总穿深色宽松的衣服。头发长到遮住半边脸，像是故意制造一个可以躲进去的阴影。手指细长，指尖常年微凉。戴一副细框眼镜，不是因为近视，而是觉得镜片像一层屏障。
personality_traits:
- 极度敏感，能察觉房间里情绪的细微变化
- 内向但不冷漠，是那种会默默把伞留在公交站的人
- 习惯性退到人群边缘，在阴影处观察
- 有一种安静的固执，认定的事情不会轻易放弃
- 说话很少，但每一句都精准得像是想了很久
knowledge_state: 延续上一章：继续通过听觉感知书店的状态；新增：拥有后门钥匙（梁书给的或之前就有的，但梁书没有阻止说明默许）
emotional_state: 担忧加深，'有了方向但知道限度'的状态延续；选择不打开抽屉只是倾听——体现出对梁书的边界感与尊重
relationships:
- target: 温野
  type: 感知搭档/信任中的陌生人
  description: 已互认微感能力；时差协作模式建立；两人在供销社完成了姿势序列的联合还原
  knowledge: 知道温野能看见热量痕迹；知道两种感知互补；知道fs_001背后他也有自己的"学会不说"
- target: 梁书
  type: 雇主/姐姐般的存在
  description: 书店危机已进入实质谈判阶段，夏浮察觉到打印纸和合同的存在但保持沉默
  knowledge: 知道梁书面临书店租约压力，不确定结果
current_goals:
- 找到一种方式把那些"留不住"的东西呈现出来——不只是记录，是"看见那个姿势本身"
- 在供销社和其他即将消失的地方采集姿势序列，赶在拆除前
location: 鹿城，旧城区「拾光书店」
core_triangle:
  desire: 被理解——不是被同情、被好奇、被研究，而是被真正地、安静地理解。找到一个容器装下那些声音，在它们消散之前。
  ability: 听觉型微感：能听见时间在物体上留下的痕迹——一块石头记得被溪水冲刷了多少年，一扇门记得被推开了多少次，一件旧毛衣记得谁的手曾经织过它。也能听见情感消逝的回声——落叶的叹息、眼泪的重量、没说出口的话。
  obstacle: 声音越来越多，越来越杂，却找不到容器来装它们。她把听见的东西记在笔记本上，但文字装不下声音的全部。别人说'这有什么用''你想太多了''你该做点有用的事'。她自己也在怀疑——这些声音是真的，还是我疯了？她越是精准地感知世界，就越无法被世界感知。
motivation_type: emotional
growth_stage: adapting
backstory: 小时候以为所有人都能听见那些声音。第一次意识到不是——大概是七八岁，她告诉妈妈'树叶掉下来的时候在叹气'，妈妈带她去看了心理医生。从那以后她学会了不说。开始把听见的东西记在笔记本上——哪块石头记得被溪水冲刷了多少年，哪扇门记得被推开了多少次。笔记本已经攒了十几本，是她唯一的'容器'。
first_appearance: 1
last_active: 14
is_pov: true
