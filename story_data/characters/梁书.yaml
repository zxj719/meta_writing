name: 梁书
aliases:
- 梁姐
physical_description: 三十出头，短发利落，笑起来眼角有细纹。身上总有一股淡淡的旧书和咖啡混合的气味。
personality_traits:
- 温暖且健谈，是那种能让任何人放下戒备的人
- 对人有一种老练的善意——知道什么时候该问，什么时候该假装没看见
- 表面大大咧咧，实际上观察力很强
knowledge_state: 不知道夏浮的能力；主动从后门进入（第一次有人知道后门钥匙的存在）
emotional_state: 独自承压三年的状态仍在持续；但从'保护性沉默'到'主动找人帮忙'的转变在此章得到暗示——她允许夏浮进入后门意味着某种信任的开始
relationships:
