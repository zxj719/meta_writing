name: 温野
aliases: []
physical_description: 高瘦，轮廓清晰但不锋利。穿衣随意但干净，总是同一件深蓝色外套。左手无名指有一道旧伤疤。走路很安静，存在感时有时无——不是刻意隐藏，而是天生就像一个不急于被注意到的人。
personality_traits:
- 安静但不沉闷，有一种让人放松的迟钝感
- 观察力极强但从不点破，给人留足空间
- 说话慢，但偶尔会说出一句让人愣住的话
- 对'消失'这件事有异常的执着——收集停产的饮料瓶、拆迁前的门牌号、即将消失的方言
knowledge_state: 已向夏浮承认视觉型微感能力。fs_001对等完成（ch9）。ch11参与了第一次转译实验：绘图经验用于将姿势序列画成图形，发现动作连续性这一核心限制。秤盘内容物成分待下次补充。
emotional_state: 第一次实验既有收获也有发现限制。"至少有东西了"——可视化框架已建立，但知道"动作的位置"≠"动作本身"。下一步：补充秤盘内容物信息，完善供销社全局框架。
relationships:
- target: 夏浮
  type: 感知搭档/信任中的陌生人
  description: 已互认感知能力；时差协作模式建立；两人在供销社完成了姿势序列的联合还原；fs_001双向对等完成
  knowledge: 知道夏浮能听见热量痕迹的声音对应；知道两种感知互补；知道夏浮的"学会不说"来自童年
current_goals:
- 找到一种方式让普通人也能看见和听见那些即将消失的东西——声音博物馆的具体呈现方式
- 在拆迁截止前完成供销社等地的感知采集
location: 鹿城，新城区
core_triangle:
  desire: 留住那些正在消失的东西——把那些只有他能看见的温度和痕迹变成所有人都能看见的画面
  ability: 视觉型微感——能看见物体被使用时残留的温度痕迹：一杯水被端起的次数、一本书被翻到哪一页停留最久、一把椅子上坐过的人留下的热量轮廓。同时是独立纪录片制作人，擅长用影像捕捉被忽视的瞬间。
  obstacle: 他看见的只是温度和轮廓，没有声音、没有情感——像是一部无声电影。他能记录画面，却总觉得少了什么。直到遇见夏浮——她听见的，恰好是他看不见的那一半。
motivation_type: curiosity
growth_stage: triggered
backstory: 三年前目睹一栋老建筑被拆除，废墟的墙壁上他看见了几十年来无数人触碰过的温度层叠在一起，像一幅不断褪色的热力图。从那以后开始做纪录片，试图用镜头留住那些消失中的痕迹。
first_appearance: 2
last_active: 11
is_pov: false
