name: 温野
aliases: []
physical_description: 高瘦，轮廓清晰但不锋利。穿衣随意但干净，总是同一件深蓝色外套。左手无名指有一道旧伤疤。走路很安静，存在感时有时无——不是刻意隐藏，而是天生就像一个不急于被注意到的人。
personality_traits:
- 安静但不沉闷，有一种让人放松的迟钝感
- 观察力极强但从不点破，给人留足空间
- 说话慢，但偶尔会说出一句让人愣住的话
- 对'消失'这件事有异常的执着——收集停产的饮料瓶、拆迁前的门牌号、即将消失的方言
knowledge_state: 知道自己能看见别人看不见的东西——物体上残留的温度、使用的痕迹。以为只是自己观察力过强，还没意识到这是一种异能。
emotional_state: 平静表面下有一层很深的缺失感。他收集那些即将消失的东西，像是在替某个人保管记忆——但他还不知道是替谁。
relationships:
- target: 夏浮
  type: 书店的常客
  description: 每周来拾光书店两三次，总是待到很晚。从不主动攀谈，但会在夏浮推荐的书旁边留下一张小纸条写读后感。
  knowledge: ''
current_goals:
- 完成一个关于'城市中正在消失的声音'的独立纪录片项目
- 弄清楚自己为什么能看见那些温度痕迹
- 找到一种方式让普通人也能'看见'那些即将消失的东西
location: 鹿城，新城区
core_triangle:
  desire: 留住那些正在消失的东西——把那些只有他能看见的温度和痕迹变成所有人都能看见的画面
  ability: 视觉型微感——能看见物体被使用时残留的温度痕迹：一杯水被端起的次数、一本书被翻到哪一页停留最久、一把椅子上坐过的人留下的热量轮廓。同时是独立纪录片制作人，擅长用影像捕捉被忽视的瞬间。
  obstacle: 他看见的只是温度和轮廓，没有声音、没有情感——像是一部无声电影。他能记录画面，却总觉得少了什么。直到遇见夏浮——她听见的，恰好是他看不见的那一半。
motivation_type: curiosity
growth_stage: initial
backstory: 三年前目睹一栋老建筑被拆除，废墟的墙壁上他看见了几十年来无数人触碰过的温度层叠在一起，像一幅不断褪色的热力图。从那以后开始做纪录片，试图用镜头留住那些消失中的痕迹。
first_appearance: 2
last_active: 0
is_pov: false
