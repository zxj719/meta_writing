beats:
- chapter: 1
  beat_type: minor
  description: 玻璃瓶三下敲击——夏浮第一次感知到他人触碰痕迹，察觉来者不寻常
  delivered: true
- chapter: 3
  beat_type: medium
  description: 陈招娣故事通过声音/温度双感知还原——两人感知互补的第一次具体验证，"拍裤子"细节命中
  delivered: true
- chapter: 4
  beat_type: medium
  description: 礼堂过载（刻度7/10）——微感能力代价的极限场景，周伯的离开
  delivered: true
- chapter: 6
  beat_type: medium
  description: 红星新村协作感知+夏浮说"嗯"——第一次对外承认微感，信任质变起点
  delivered: true
- chapter: 7
  beat_type: medium
  description: '"我一直以为我只是听力太好"/"我一直以为我只是眼力太好"——互认完成，两人正式确认感知互补'
  delivered: true
- chapter: 9
  beat_type: major
  description: fs_001对等完成（温野讲同桌故事，夏浮"你现在问了"接住）；声音博物馆功能雏形出现（格式转换）
  delivered: true
- chapter: 10
  beat_type: medium
  description: 秤盘姿势序列还原——"托起、稳住、转腕、轻放"，两种微感合力还原一个人的动作
  delivered: true
- chapter: 11
  beat_type: medium
  description: 声音博物馆第一次实操——姿势转译测试第一版，发现"动作位置"vs"动作本身"的核心限制，梁书首次直接目击工作成果
  delivered: true
- chapter: 12
  beat_type: medium
  description: 梁书说出"房东要涨价"且是"一倍半"时的数字冲击，以及"如果不签——"那半句没说完的停顿，在平静叙述中制造出强烈的压迫感
  delivered: true
- chapter: 13
  beat_type: minor
  description: 夏浮听出抽屉底部那个'被压住的声音'——它想说但说不出来，只能发出闷闷的、从缝隙里透出来的微弱声音。这个声音比涨租通知和账单更隐秘，更个人，像是梁书压在心底三年没说出口的某句话。
  delivered: true
- chapter: 14
  beat_type: minor
  description: 夏浮十四本笔记 vs 梁书三本账本——两组数字的交换是本章情感核心；夏浮首次将书店本身作为感知对象巡游，三年工作场所变成有声音的地方；梁书提出秤盘姿势放展览入口，"第一个被记住的是开始"
  delivered: true
- chapter: 15
  beat_type: minor
  description: 三人沉默地围坐在桌前，台灯的光把凉咖啡和温咖啡照在一起——某种无声的默契达成，没有言语但位置自己找到了
  delivered: true
- chapter: 16
  beat_type: major
  description: 夏浮用声音微感"旁观"谈判全程，不是话语而是频率的变化——门板振动→节奏加速→一声确定的"放下"→长沉默。谈判结束，纸上墨水的频率"介于续约和终止之间"，她听不懂。梁书说"先看展览"——这是弧线第一阶段的真正高潮
  delivered: true
hooks:
- chapter: 1
  hook_type: suspense
  description: 他会再来吗？玻璃瓶三下声音在她脑中回响，"寻找的频率"
  position: end
- chapter: 2
  hook_type: reversal
  description: 拍立得照片中夏浮感知到了门的声音；"明天，同一时间，我带你去"
  position: end
- chapter: 3
  hook_type: emotional
  description: '"名字。照片里没有名字"——感知的边界与命名的缺失，温野的镜头里只有形状'
  position: end
- chapter: 4
  hook_type: suspense
  description: 礼堂过载余震——底噪持续，微感能力的真实代价悬置
  position: end
- chapter: 5
  hook_type: emotional
  description: '"我看见的那个温度，和你听见的是同一个人"——互补感知首次言语化确认'
  position: end
- chapter: 6
  hook_type: suspense
  description: '"你以前有没有遇见过别人也能——"嗯——一字承认，问句永远悬置'
  position: end
- chapter: 7
  hook_type: conflict
  description: 梁书谈判语调——书店危机隐线加重，租约是否续签未决
  position: end
- chapter: 8
  hook_type: suspense
  description: '"记下来就够了吗"——夏浮对自己记录习惯的第一次质疑，方向待转'
  position: end
- chapter: 9
  hook_type: reversal
  description: 声音博物馆功能雏形（格式转换）出现——他们的合作有了具体可能性
  position: end
- chapter: 10
  hook_type: suspense
  description: 供销社下个月拆，姿势序列呈现窗口收窄；梁书的打印纸暗示书店危机临近
  position: end
- chapter: 11
  hook_type: suspense
  description: 秤盘内容物成分不明——"如果下次去的时候你能告诉我是什么，那个姿势会更完整"；声音博物馆有了第一版但知道自己还不够
  position: end
- chapter: 12
  hook_type: suspense
  description: 梁书说"我想在做一个办法"后戛然而止，留下未完的句子——她到底想做什么？涨租背后的真相是否与之前的线索（秤盘、供销社、涨租通知）有关联？
  position: end
- chapter: 13
  hook_type: suspense
  description: 梁书来了，脚步声在后台响起。上一章她说过'帮我把第三层那个盒子拿下来'，这一章她的第一句话会是什么？那个底部被压住的声音究竟是什么——是某封没寄出的信？还是某个无法对人说出口的决定？
  position: end
- chapter: 14
  hook_type: suspense
  description: '"没有再推的余地了"——明天房东两点来，温野三点来，谈判无可再拖，展览和书店存亡同时进入倒计时'
  position: end
- chapter: 15
  hook_type: suspense
  description: 梁书说'今天不谈那个'（房东谈判），转而问温野：'展览的事，能不能给我也讲一遍'——她要进来了，但她准备好了吗？她将以什么方式参与转译？
  position: end
- chapter: 16
  hook_type: reversal
  description: '"谈完了"但没说结果。纸上墨水频率介于续约和终止之间——既不是好消息也不是坏消息。梁书说"先看展览"，把答案推后了。谈判结果悬置，展览变成了唯一的出路。'
  position: end
- chapter: 17
  hook_type: revelation
  description: '"不是声音，是记忆"——梁书演示秤盘姿势时，夏浮感知到了供销社的残影，那个姿势背后有三十七年的身体记忆。梁书与供销社的深层联系开始浮出水面。'
  position: end
